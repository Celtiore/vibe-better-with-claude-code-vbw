# Separate workflow for linked-issue enforcement.
# Split from ci.yml so that PR body edits (the `edited` event) only re-run this
# lightweight check — not the full lint/test/QA matrix. Avoids the classic branch
# protection issue where skipped required checks block merges.
name: CI

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

permissions:
  issues: read
  pull-requests: read

jobs:
  linked-issue-check:
    name: Linked Issue
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Method 1: Check PR body for issue references
          # Matches: Fixes #N, Closes #N, Resolves #N (with optional owner/repo prefix)
          # Also matches standalone #N references and full GitHub issue URLs
          body_has_ref=false
          body_detail=""

          if printf '%s\n' "$PR_BODY" | grep -qiE '(fix(es|ed)?|close[sd]?|resolve[sd]?)\s+([a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#[1-9][0-9]*\b'; then
            body_has_ref=true
            body_detail=$(printf '%s\n' "$PR_BODY" | grep -ioE '(fix(es|ed)?|close[sd]?|resolve[sd]?)\s+([a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#[1-9][0-9]*\b' | sort -u | tr '\n' ' ')
          elif printf '%s\n' "$PR_BODY" | grep -qE 'https://github\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/issues/[1-9][0-9]*\b'; then
            body_has_ref=true
            body_detail=$(printf '%s\n' "$PR_BODY" | grep -oE 'https://github\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/issues/[1-9][0-9]*\b' | sort -u | tr '\n' ' ')
          elif printf '%s\n' "$PR_BODY" | grep -qE '(^|[^#&a-zA-Z0-9])#[1-9][0-9]*\b'; then
            body_has_ref=true
            body_detail=$(printf '%s\n' "$PR_BODY" | grep -oE '(^|[^#&a-zA-Z0-9])#[1-9][0-9]*\b' | grep -oE '#[1-9][0-9]*' | sort -u | tr '\n' ' ')
          fi

          # Method 2: Check GitHub timeline for sidebar-linked issues
          sidebar_linked=false
          sidebar_detail=""
          if timeline_json=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/timeline" --paginate --jq '[.[] | select(.event == "connected") | .source.issue.number // empty] | unique | .[]' 2>/dev/null); then
            if [ -n "$timeline_json" ]; then
              sidebar_linked=true
              for num in $timeline_json; do
                sidebar_detail="${sidebar_detail:+$sidebar_detail }#$num"
              done
            fi
          else
            echo "Warning: could not query timeline API — sidebar-link detection unavailable."
          fi

          if [ "$body_has_ref" = "true" ] || [ "$sidebar_linked" = "true" ]; then
            echo "Linked issue check passed"
            if [ -n "$body_detail" ]; then
              echo "  PR body: $body_detail"
            fi
            if [ -n "$sidebar_detail" ]; then
              echo "  Sidebar: $sidebar_detail"
            fi
          else
            echo "::error::PR must reference a tracking issue. Accepted formats: 'Fixes #N' / 'Closes #N' / 'Resolves #N', a full GitHub issue URL, a bare '#N' reference, or a sidebar-linked issue. See CONTRIBUTING.md."
            exit 1
          fi
